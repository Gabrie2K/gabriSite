<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spatium — CST</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- CSS — ordine: variabili → componenti -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/taskbar.css">
  <link rel="stylesheet" href="css/window.css">
  <link rel="stylesheet" href="css/graph.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/calendar.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/tree.css">
  <link rel="stylesheet" href="css/brain.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/schema.css">
</head>
<body>

  <!-- Sfondo stelle (canvas) -->
  <canvas id="bg"></canvas>

  <!-- Area desktop: qui vengono montate le finestre -->
  <div id="desktop"></div>

  <!-- Taskbar fissa in basso -->
  <div id="taskbar">
    <span class="tb-logo">✦ CST</span>
    <div id="tb-wins"></div>
    <div class="tb-actions">
      <button class="tb-action" id="btn-export">Esporta</button>
      <button class="tb-action" id="btn-import">Importa</button>
      <button class="tb-new" id="btn-new">+ Nuova</button>
      <input type="file" id="import-file" accept="application/json" style="display:none">
    </div>
  </div>

  <!-- Dipendenze esterne — devono precedere tutti gli script app -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

  <!--
    JS — ordine di caricamento:
    1. templates     → dati TPL
    2. three-helpers → SPHERE_R, CAM_START, assignPositions, makeLabel
    3. background    → animazione stelle (indipendente)
    4. window-manager→ WINS, createWin, ecc.
    5. scene3d       → create3DScene (lazy da window-manager)
    6. calendar      → initCalendar, renderAllEvents, scrollToNow
    7. sidepanel     → openSP
    8. map           → initMap, mapBodyHTML, addMapPin
    9. tree          → initTree, treeBodyHTML
   10. main          → entry point
  -->
  <script src="js/templates.js"></script>
  <script src="js/three-helpers.js"></script>
  <script src="js/background.js"></script>
  <script src="js/window-manager.js"></script>
  <script src="js/scene3d.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/sidepanel.js"></script>
  <script src="js/map.js"></script>
  <script src="js/tree.js"></script>
  <script src="js/brain.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/schema.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/main.js"></script>

  <script>
    // wiring bottoni export/import taskbar
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('btn-export')?.addEventListener('click', () => window.exportStateToFile && window.exportStateToFile());
      const inp = document.getElementById('import-file');
      document.getElementById('btn-import')?.addEventListener('click', () => inp?.click());
      inp?.addEventListener('change', e => {
        const f = e.target.files && e.target.files[0];
        if (f && window.importStateFromFile) window.importStateFromFile(f);
        e.target.value = '';
      });
    });
  </script>

</body>
</html>
